<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

<style>
  .static {
    width: 100px;
    height: 100px;
    margin: 30px;
    background-color: aqua;
    padding: 20px;
    border: 3px solid black;
    position: static
  }

  .caixa {
    width: 100px;
    height: 100px;
    background-color: lightgreen;
    border: 3px solid black;
  }

  .relative {
    width: 100px;
    height: 100px;
    background-color: lightblue;
    border: 3px solid black;
    left: 30px;
    top: 20px;
    position: relative
  }

  .a {
    display: inline-block;

  }

  .relative2 {
    width: 400px;
    height: 400px;
    border: 10px, solid black;
    margin: 10px;
    position: relative
  }

  .absolute {
    width: 100px;
    height: 100px;
    background-color: aquamarine;
    border: 3px solid black;
    bottom: 20px;
    right: 10px;
    position: absolute
  }

  .fixed,
  .fixed2 {
    position: fixed;
    width: 100px;
    height: 100px;
    background-color: lightslategrey;
    border: 3px solid black;
    right: 150px;
    top: 10px;
  }

  .fixed {
    right: 300px;
  }

  .sticky {
    border: 3px solid black;
    width: 100px;
    height: 100px;
    top: 10px;
    right: 450px;
    position: sticky
  }
</style>
</head>
<body>
  <div class='a'>
    <div class='static'>STATIC</div>
    <div class='caixa'>Caixa</div>
    <div class='relative'>RELATIVE</div>
    <div class='caixa'>Caixa</div>
    <div>
      <div class='a'>
        <div class="relative2">
          RELATIVE
          <div class="absolute">ABSOLUTE</div>
        </div>
      </div>
      <div class="fixed">FIXED</div>
      <div class="fixed2">FIXED</div>
      <div class="sticky">STICKY</div>
</html>
